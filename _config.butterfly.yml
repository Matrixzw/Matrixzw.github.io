nav:
  # 導航欄 Logo 圖片
  logo:
  # 是否顯示標題
  display_title: true
  # 是否在滾動時顯示文章標題
  display_post_title: false
  # 是否固定導航欄
  fixed: true

# 首頁頭圖的設置
# 默認: 頭圖全屏，站點信息在中間
# 站點信息的位置，例如: 300px/300em/300rem/10%
index_site_info_top: 10%
# 頭圖的高度，例如: 300px/300em/300rem
index_top_img_height: 200px

aside:
  # 是否啟用側邊欄
  enable: true
  # 是否默認隱藏側邊欄
  hide: false
  # 是否在右下角顯示隱藏側邊欄的按鈕
  button: true
  # 移動設備上是否啟用側邊欄
  mobile: true
  # 側邊欄位置：left / right
  position: right
  display:
    # 歸檔頁面是否顯示側邊欄
    archive: true
    # 標籤頁面是否顯示側邊欄
    tag: true
    # 分類頁面是否顯示側邊欄
    category: true
  card_author:
    # 是否顯示作者信息卡片
    enable: true
    # 作者描述
    description:
    button:
      # 是否顯示按鈕
      enable: true
      # 按鈕圖標
      icon: fab fa-github
      # 按鈕文本
      text: 关注我
      # 按鈕鏈接
      link:
  card_announcement:
    # 是否顯示公告卡片
    enable: true
    # 公告內容
    content: 记录美好生活


  avatar:
    img: ./img/avatar.png
    effect: false # 頭像會一直轉圈


    # Share.js
  # https://github.com/overtrue/share.js
  sharejs:
    # sites: facebook,twitter,wechat,weibo,qq
