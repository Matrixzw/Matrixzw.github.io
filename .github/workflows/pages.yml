name: Deploy Hexo to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Clone theme
        run: |
          rm -rf themes 
          git clone --depth=1 -b main https://github.com/jerryc127/hexo-theme-butterfly.git themes/butterfly

      - name: Install dependencies
        run: |
          pnpm install
          pnpm add hexo-util hexo-log hexo-fs

      - name: Build
        run: |
          pnpm run build
          ls -la public/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
