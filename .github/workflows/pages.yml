name: Deploy Hexo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive # 关键：拉取子模块（主题）

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: |
          pnpm install
          # 关键：安装 Butterfly 需要的依赖
          pnpm add hexo-util hexo-log hexo-fs cheerio
          # 主题内依赖
          cd themes/butterfly && pnpm install || npm install || true

      - name: Build Hexo
        run: |
          pnpm run build
          # 验证输出
          ls -la public/
          test -f public/index.html && echo "✅ Build success" || echo "❌ Build failed"

      - name: Upload artifact
        uses: actions/upload-pages-artifact
