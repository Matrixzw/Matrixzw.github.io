name: Deploy Hexo to GitHub Pagesv2

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # 删除 submodules: recursive，普通文件不需要

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Clone theme
        run: |
          rm -rf themes
          git clone --depth=1 -b main https://github.com/jerryc127/hexo-theme-butterfly.git themes/butterfly

      - name: Install dependencies
        run: |
          pnpm install
          pnpm add hexo-util hexo-log hexo-fs cheerio

      - name: Build Hexo
        run: |
          pnpm run build
          ls -la public/
          test -f public/index.html && echo "✅ Build success" || echo "❌ Build failed"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4